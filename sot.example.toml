# ─────────────────────────────────────────────────────────────────────────────
#  sot-cli  —  Configuration File
# ─────────────────────────────────────────────────────────────────────────────
#  Rename this file to `sot.toml` and fill in your provider details.
#  API keys go in `sot.keys.toml` (separate file, never committed).
#
#  Every setting here has a full explanation in ARCHITECTURE.md.
# ─────────────────────────────────────────────────────────────────────────────


# ─────────────────────────────────────────────────────────────────────────────
#  [app]              General application settings
# ─────────────────────────────────────────────────────────────────────────────

[app]
name     = "sot-cli"
data_dir = ".sot-cli"    # where sessions, logs, and metadata are stored


# ─────────────────────────────────────────────────────────────────────────────
#  [runtime]           Which provider to use by default
# ─────────────────────────────────────────────────────────────────────────────

[runtime]
primary_provider = "ollama"   # fallback when no --provider flag is given


# ─────────────────────────────────────────────────────────────────────────────
#  [tools]             Fine-tune how the AI uses its tools
# ─────────────────────────────────────────────────────────────────────────────
#  Each value below is a sensible default. Tweak as you see fit.
#  Full documentation: ARCHITECTURE.md → "[tools] reference".
# ─────────────────────────────────────────────────────────────────────────────

[tools]

    # Hard time limit (in seconds) every `run_command` invocation runs under.
    # The model cannot override this per call. Raise it only if the host's
    # legitimately slow operations consistently exceed three minutes.
    default_command_timeout_seconds = 180

    # When reading files, the first N bytes are inspected for binary content.
    # Anything that isn't valid UTF-8 beyond this point is rejected, keeping
    # garbage out of the context window. Set to 0 to skip binary detection
    # entirely — all files are treated as text (unless they have a known
    # binary extension like .png, .jpg).
    binary_check_size = 0

    # ── Streaming visibility ───────────────────────────────────────────────

    # Show the model's internal reasoning as it arrives in the terminal?
    # The model still reasons either way — this only controls the live view.
    show_thinking = true

    # Show raw tool-call arguments as the model generates them?
    # Disable if you prefer a single assembled line after streaming ends.
    show_full = true

    # ── Turn limits (safety wheels) ────────────────────────────────────────

    # Maximum tool-call rounds the main (boss) agent can take per prompt.
    max_rounds = 250

    # Same thing, but for sub-agents spawned via `delegate_task`.
    delegated_max_rounds = 80

    # How many times the boss can repeat the exact same tool call before the
    # runtime aborts the loop. Catches "stuck-in-a-loop" failures early.
    repeat_limit = 3

    # Same thing for sub-agents. Tighter because workers should converge fast.
    delegated_repeat_limit = 2

    # ── Code search ────────────────────────────────────────────────────────

    # Default max results returned by `search_code` when the model doesn't
    # pass an explicit `head_limit`. Pass 0 to disable the cap per call.
    search_default_head_limit = 200

    # Truncate long lines in search results to this many characters.
    search_max_line_length = 1000

    # Hard timeout (seconds) for a single `search_code` call. Prevents a
    # pathological regex from hanging the whole turn.
    search_timeout_seconds = 30

    # ── Reasoning budget ───────────────────────────────────────────────────

    # Hard cap on reasoning/thinking characters per turn for the main agent.
    # Set to 0 to disable — the model can think as much as it wants.
    reasoning_char_budget = 0

    # Same cap for sub-agents. 0 means unlimited.
    delegated_reasoning_char_budget = 0

    # ── Token economy (compression) ────────────────────────────────────────

    # Play a notification sound when a turn finishes (so you know to look at
    # the terminal without staring at it). Requires assets/turn_done.wav.
    play_finished_notification = true

    # Max tokens a single text file can have before read_files warns and
    # requires `force: true`. Set to 0 to disable the warning entirely.
    max_readable_file_tokens = 64000

    # Max characters kept from the reasoning of tool-calling assistants in
    # closed turns. When a past turn's assistant called tools, its reasoning
    # is clipped to this length before being sent to the API again.
    # Set to 0 to keep full reasoning across all turns (more tokens).
    compression_reasoning_trunc_chars = 240


# ─────────────────────────────────────────────────────────────────────────────
#  [providers.*]       Connect to the AI backends
# ─────────────────────────────────────────────────────────────────────────────
#  Each block configures one API endpoint. You can have as many as you want.
#  Switch between them at runtime with the --provider flag or the interactive
#  selector. API keys live in `sot.keys.toml` (one file for all keys).
#
#  Common fields:
#    base_url          Full URL including "/v1" (OpenAI-compatible format).
#    model             Model name. Empty = auto-resolve (local servers only).
#    temperature       Sampling temperature (0.0 – 2.0). Higher = more random.
#    max_output_tokens Max tokens the model can generate per response.
# ─────────────────────────────────────────────────────────────────────────────

# ── LM Studio (local) ──────────────────────────────────────────────────
#  Runs fully offline on your machine. Connect to the LM Studio server.
[providers.lmstudio]
base_url = "http://localhost:1234/v1"
model = ""                              # empty = auto-detect loaded model
subagent_model = ""                  # optional model for delegated sub-agents (empty = use main model)
temperature = 0.7
max_output_tokens = 32768

# ── OpenRouter ─────────────────────────────────────────────────────────
#  Gateway to hundreds of models (free & paid). Needs an API key.
[providers.openrouter]
base_url = "https://openrouter.ai/api/v1"
model = "x-ai/grok-4.1-fast"
subagent_model = ""                  # optional model for delegated sub-agents (empty = use main model)
temperature = 0.7
max_output_tokens = 32768
http_referer = "https://github.com/SoftwareLogico/sot-cli"     # for rankings
app_title = "sot-cli"                                          # for rankings
categories = "coding,developer-tools"                          # OpenRouter attribution (up to 2, lowercase, hyphen-separated)
# reasoning effort hint ("none"|"low"|"medium"|"high"|"xhigh")
# OpenRouter nested format: {"reasoning": {"effort": "..."}}
reasoning_effort = "medium"
# OpenRouter provider selection — restrict which upstream serves the model.
# Examples: "Anthropic", "Google", "Mistral", "DeepSeek", etc.
# Leave empty for automatic routing (default).
provider_selection = ""
# ── NVIDIA NIM ─────────────────────────────────────────────────────────
#  NVIDIA's hosted API for their optimized models.
[providers.nvidia]
base_url = "https://integrate.api.nvidia.com/v1"
model = "qwen/qwen3-coder-480b-a35b-instruct"
subagent_model = ""                  # optional model for delegated sub-agents (empty = use main model)
temperature = 0.7
max_output_tokens = 32768
# reasoning effort hint — enables thinking/reasoning on supported models.
# The adapter infers the correct chat_template_kwargs from the model name:
#   nemotron*  → enable_thinking + medium_effort
#   minimaxai* → thinking_mode
#   deepseek*  → thinking + reasoning_effort
#   glm*       → enable_thinking + clear_thinking
#   kimi*      → thinking
#   mistral*   → reasoning_effort (top-level)
#   gpt-oss*   → reasoning_effort (top-level)
# Accepted values: "none" | "medium" | "high" | "xhigh"
reasoning_effort = "high"

# ── Amazon Bedrock ──────────────────────────────────────────────────
#  AWS Bedrock via Converse API (native, with thinking/reasoning support).
[providers.bedrock]
base_url = "https://bedrock-mantle.us-east-1.api.aws/openai/v1"
region = "us-east-1"
model = "us.anthropic.claude-sonnet-4-20250514-v1:0"
subagent_model = "moonshotai.kimi-k2.5"
temperature = 1.0
max_output_tokens = 32768
reasoning_effort = "high"
# thinking_type controls how extended reasoning is sent to the model.
# "adaptive"  — Fable 5, Claude Opus 4, Claude 3.7+ (uses output_config.effort)
# "enabled"   — Older Claude models like Sonnet/Haiku (uses budget_tokens)
# Omit this field to let the runtime infer from the model name automatically.
thinking_type = "adaptive"
project_id = "proj_pcz....." #default


# ── Ollama (local) ─────────────────────────────────────────────────────
#  Run models locally with Ollama. Just point to your Ollama server.
[providers.ollama]
base_url = "http://localhost:11434/v1"
model = ""                              # empty = auto-detect loaded model
subagent_model = ""                  # optional model for delegated sub-agents (empty = use main model)
temperature = 0.7
max_output_tokens = 32768

# ── OpenAI (and any OpenAI-compatible API) ──────────────────────────────
#  The real OpenAI API — or any self-hosted server that speaks the same
#  protocol (vLLM, llama.cpp, etc.).
[providers.openai]                      # works with any OpenAI-compatible API
base_url = "https://api.openai.com/v1"
model = "gpt-5-nano-2025-08-07"     # required — set to your model name
subagent_model = ""                  # optional model for delegated sub-agents (empty = use main model)
temperature = 0.7
max_output_tokens = 32768

# ─────────────────────────────────────────────────────────────────────────────
#  [mcp.servers.*]     External tools via the Model Context Protocol
# ─────────────────────────────────────────────────────────────────────────────
#  Add any MCP-compatible server here and its tools are automatically
#  exposed to the AI, namespaced by server name.
# ─────────────────────────────────────────────────────────────────────────────

[mcp.servers.test]
command = "python"
args = ["mcps/test.py"]
